<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untuk Tiyara 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-pink: #ff69b4;
      --hot-pink: #ff1493;
      --rose-pink: #ffb6c1;
      --blush: #fff0f5;
      --cream: #fffaf0;
      --gold: #ffd700;
      --text-color: #4b0082;
    }

    html, body {
      height: 100%;
      background: var(--blush);
      color: var(--text-color);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ─── SCENES ───────────────────────────────────────────── */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 10;
    }
    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── NOISE GRAIN OVERLAY ───────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* ════════════════════════════════════════════════════════
       SCENE 1 — INTRO
    ════════════════════════════════════════════════════════ */
    #scene-intro {
      background: radial-gradient(circle at center, #ffb6c1 0%, #fff0f5 70%);
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .intro-lines {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      align-items: center;
    }

    .intro-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: var(--hot-pink);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 1s ease, transform 1s ease;
      letter-spacing: 0.02em;
    }
    .intro-line.show { opacity: 1; transform: translateY(0); }

    .intro-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--deep-pink);
      opacity: 0;
      animation: pulse-dot 2s ease infinite;
    }
    .intro-dot.show { opacity: 1; }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.5); opacity: 1; }
    }

    .btn-continue {
      margin-top: 2.5rem;
      padding: 0.75rem 2.4rem;
      border: 2px solid var(--deep-pink);
      border-radius: 60px;
      background: var(--cream);
      color: var(--hot-pink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.3s, transform 0.3s;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn-continue.show { opacity: 1; }
    .btn-continue:hover { background: var(--blush); transform: scale(1.04); }

    /* ════════════════════════════════════════════════════════
       SCENE 2 — CAKE
    ════════════════════════════════════════════════════════ */
    #scene-cake {
      background: radial-gradient(circle at center, #ffb6c1 0%, #fff0f5 70%);
      gap: 0;
      overflow: hidden;
    }

    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .cake-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 1rem;
      transform: translateY(20px);
      opacity: 0;
      transition: opacity 1s ease, transform 1s ease;
    }
    .cake-wrapper.show { opacity: 1; transform: translateY(0); }

    .plate-glow {
      position: absolute;
      bottom: -20px;
      width: 280px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,105,180,0.35) 0%, transparent 70%);
      filter: blur(8px);
    }

    .candles {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      margin-bottom: -2px;
      z-index: 10;
    }

    .candle-group { display: flex; flex-direction: column; align-items: center; }

    .flame-wrap {
      position: relative;
      width: 14px;
      height: 26px;
      margin-bottom: 2px;
    }
    .flame {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 22px;
      background: radial-gradient(ellipse at 50% 80%, #fff 0%, #ffe066 30%, #ff69b4 65%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flicker 0.12s ease-in-out infinite alternate;
      filter: blur(0.5px);
      transform-origin: bottom center;
    }
    .glow-halo {
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 28px;
      background: radial-gradient(circle, rgba(255,105,180,0.35) 0%, transparent 70%);
      animation: flicker 0.15s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes flicker {
      0%   { transform: translateX(-50%) scaleY(1)   scaleX(1); }
      33%  { transform: translateX(-50%) scaleY(1.06) scaleX(0.92); }
      66%  { transform: translateX(-50%) scaleY(0.96) scaleX(1.05); }
      100% { transform: translateX(-50%) scaleY(1.02) scaleX(0.97); }
    }

    .candle-stick {
      width: 10px; height: 44px;
      border-radius: 4px 4px 2px 2px;
      position: relative;
    }

    .c1 .candle-stick { background: linear-gradient(180deg, #ffb6c1, #ff69b4); }
    .c2 .candle-stick { background: linear-gradient(180deg, #ff69b4, #ff1493); }
    .c3 .candle-stick { background: linear-gradient(180deg, #ffd700, #ffb6c1); }
    .c4 .candle-stick { background: linear-gradient(180deg, #ffb6c1, #fff0f5); }
    .c5 .candle-stick { background: linear-gradient(180deg, #ff69b4, #ff1493); }

    .flame-wrap.blown .flame,
    .flame-wrap.blown .glow-halo { opacity: 0; transition: opacity 0.3s ease; }
    .smoke {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 0;
      background: rgba(255,182,193,0.6);
      border-radius: 2px;
      opacity: 0;
      filter: blur(1px);
    }
    .flame-wrap.blown .smoke {
      animation: smoke-rise 2s ease forwards;
    }
    @keyframes smoke-rise {
      0%   { height: 0; opacity: 0.7; transform: translateX(-50%) scaleX(1); }
      50%  { height: 20px; opacity: 0.4; transform: translateX(-50%) scaleX(1.5); }
      100% { height: 35px; opacity: 0; transform: translateX(-50%) scaleX(2); }
    }

    .cake-tiers { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .tier { position: relative; border-radius: 6px 6px 2px 2px; overflow: hidden; }
    .tier-top { width: 120px; height: 54px; background: linear-gradient(180deg, #ffb6c1, #ff69b4); }
    .tier-mid { width: 175px; height: 62px; background: linear-gradient(180deg, #ff69b4, #ff1493); margin-top: -2px; }
    .tier-bot { width: 230px; height: 74px; background: linear-gradient(180deg, #ffb6c1, #ff69b4); margin-top: -2px; }
    .cake-plate { width: 260px; height: 14px; background: linear-gradient(180deg, #ffd700, #fff8dc); border-radius: 0 0 10px 10px; }

    .blow-btn {
      margin-top: 2.2rem;
      padding: 0.7rem 2.2rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--hot-pink), var(--deep-pink));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .blow-btn.show { animation: btn-appear 0.6s ease 0.4s forwards; }
    @keyframes btn-appear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .blow-btn.hidden { display: none; }

    .hint { font-size: 0.73rem; color: rgba(255,105,180,0.45); margin-top: 0.7rem; opacity: 0; }
    .hint.show { opacity: 1; }

    /* ════════════════════════════════════════════════════════
       SCENE 3 — WISH (WITH TYPEWRITER & CONTAINER)
    ════════════════════════════════════════════════════════ */
    #scene-wish {
      background: radial-gradient(circle at center, #ffb6c1 0%, #fff0f5 70%);
      padding: 2.5rem 1.8rem;
      text-align: center;
      overflow-y: auto;
    }

    .wish-card {
      max-width: 540px;
      background: rgba(255,255,255,0.7);
      border: 3px solid var(--deep-pink);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1s ease, transform 1s ease;
      box-shadow: 0 8px 25px rgba(255,105,180,0.2);
      position: relative;
    }
    .wish-card.show { opacity: 1; transform: translateY(0); }

    .wish-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--hot-pink);
      margin-bottom: 1.5rem;
      text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
    }
    .wish-body {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-color);
      text-align: left;
      min-height: 200px;
      padding: 1.2rem;
      background: var(--cream);
      border-radius: 15px;
      border: 1px dashed var(--deep-pink);
      box-shadow: inset 0 0 10px rgba(255,105,180,0.1);
    }
    
    .typing::after {
      content: '|';
      animation: blink 0.7s infinite;
      color: var(--hot-pink);
      font-weight: bold;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .btn-next-video {
        margin-top: 1.5rem;
        padding: 0.8rem 2rem;
        background: var(--hot-pink);
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.5s;
        box-shadow: 0 4px 15px rgba(255,20,147,0.3);
    }
    .btn-next-video.show { opacity: 1; transform: translateY(0); }

    /* ════════════════════════════════════════════════════════
       SCENE 4 — VIDEO (AESTHETIC POLAROID)
    ════════════════════════════════════════════════════════ */
    #scene-video {
      background: radial-gradient(circle, #ffc0cb 0%, #ff69b4 100%);
      overflow: hidden;
    }

    .video-container {
        position: relative;
        background: white;
        padding: 15px 15px 60px 15px; /* Lebihan bawah ala polaroid */
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        border-radius: 10px;
        transform: rotate(-2deg); /* Miring sedikit biar lucu */
        max-width: 90%;
        animation: swing 3s ease-in-out infinite alternate;
    }

    @keyframes swing {
        from { transform: rotate(-2deg) translateY(0); }
        to { transform: rotate(2deg) translateY(-10px); }
    }

    #myVideo {
      width: 100%;
      border-radius: 5px;
      display: block;
      background: #000;
    }

    .polaroid-text {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Pacifico', cursive;
        color: var(--hot-pink);
        font-size: 1.2rem;
        width: 100%;
        text-align: center;
    }

    .video-hiasan {
        position: absolute;
        font-size: 2.5rem;
        z-index: 5;
        filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
    }
    .v1 { top: 10%; left: 5%; animation: bounce 2s infinite; }
    .v2 { top: 5%; right: 10%; animation: bounce 2.5s infinite; }
    .v3 { bottom: 5%; left: 10%; animation: bounce 3s infinite; }
    .v4 { bottom: 15%; right: 5%; animation: bounce 2.2s infinite; }

    @keyframes bounce {
        0%, 100% { transform: scale(1) rotate(0); }
        50% { transform: scale(1.2) rotate(10deg); }
    }

    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    .star-field { position: absolute; inset: 0; pointer-events: none; }
    .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 2s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
  </style>
</head>
<body>

<audio id="bg-music" loop src="musik.mp3"></audio>
<canvas id="confetti-canvas"></canvas>

<section id="scene-intro" class="scene active">
  <div class="intro-lines">
    <span class="intro-line" id="l1">ada sesuatu yang mau aku kasih ke kamu…</span>
    <span class="intro-line" id="l2">jangan buru-buru ya.</span>
    <span class="intro-line" id="l3">semoga kamu sukaa.</span>
    <div class="intro-dot" id="idot"></div>
  </div>
  <button class="btn-continue" id="btn-enter">buka sekarang →</button>
</section>

<section id="scene-cake" class="scene">
  <div class="particles" id="particles"></div>
  <div class="cake-wrapper" id="cake-wrapper">
    <div class="candles">
      <div class="candle-group c1"><div class="flame-wrap"><div class="flame"></div><div class="glow-halo"></div><div class="smoke"></div></div><div class="candle-stick"></div></div>
      <div class="candle-group c2"><div class="flame-wrap"><div class="flame"></div><div class="glow-halo"></div><div class="smoke"></div></div><div class="candle-stick"></div></div>
      <div class="candle-group c3"><div class="flame-wrap"><div class="flame"></div><div class="glow-halo"></div><div class="smoke"></div></div><div class="candle-stick"></div></div>
      <div class="candle-group c4"><div class="flame-wrap"><div class="flame"></div><div class="glow-halo"></div><div class="smoke"></div></div><div class="candle-stick"></div></div>
      <div class="candle-group c5"><div class="flame-wrap"><div class="flame"></div><div class="glow-halo"></div><div class="smoke"></div></div><div class="candle-stick"></div></div>
    </div>
    <div class="cake-tiers">
      <div class="tier tier-top"></div>
      <div class="tier tier-mid"></div>
      <div class="tier tier-bot"></div>
    </div>
    <div class="cake-plate"></div>
    <div class="plate-glow"></div>
  </div>
  <button class="blow-btn" id="blow-btn">🕯️ tiup lilin</button>
  <p class="hint" id="cake-hint">klik lilinnya untuk meniup</p>
</section>

<section id="scene-wish" class="scene">
  <div class="star-field" id="star-field"></div>
  <div class="wish-card" id="wish-card">
    <h1 class="wish-title">Happy Birthday, Tiyara.</h1>
    <div class="wish-body typing" id="typewriter-text"></div>
    <button class="btn-next-video" id="btn-video">Klik di sini yaa 💖</button>
  </div>
</section>

<section id="scene-video" class="scene">
  <div class="video-hiasan v1">🎀</div>
  <div class="video-hiasan v2">🌸</div>
  <div class="video-hiasan v3">🍭</div>
  <div class="video-hiasan v4">💕</div>
  
  <div class="video-container">
      <video id="myVideo" controls>
        <source src="video.mp4" type="video/mp4">
        Browser kamu tidak mendukung video.
      </video>
      <div class="polaroid-text">Spesial buat kamu ✨</div>
  </div>
</section>

<script>
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));

function showScene(showId) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  $(showId).classList.add('active');
}

async function runIntro() {
  await delay(600); $('l1').classList.add('show');
  await delay(1300); $('l2').classList.add('show');
  await delay(1100); $('l3').classList.add('show');
  await delay(900); $('idot').classList.add('show');
  await delay(700); $('btn-enter').classList.add('show');
}
runIntro();

$('btn-enter').addEventListener('click', async () => {
  showScene('scene-cake');
  const music = $('bg-music');
  music.volume = 0.5;
  music.play().catch(() => {});
  
  createParticles();
  await delay(500);
  $('cake-wrapper').classList.add('show');
  await delay(800);
  $('blow-btn').classList.add('show');
  $('cake-hint').classList.add('show');
});

function createParticles() {
  const container = $('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `width:4px;height:4px;left:${Math.random()*100}%;background:#ff69b4;animation-duration:${5+Math.random()*5}s;`;
    container.appendChild(p);
  }
}

let blown = false;
const blowAction = () => {
  if (blown) return;
  blown = true;
  $('blow-btn').classList.add('hidden');
  document.querySelectorAll('.flame-wrap').forEach((f, i) => {
    setTimeout(() => f.classList.add('blown'), i * 150);
  });
  setTimeout(() => {
    launchConfetti();
    setTimeout(startWishScene, 2000);
  }, 800);
};

$('blow-btn').addEventListener('click', blowAction);
document.querySelectorAll('.flame-wrap').forEach(f => f.addEventListener('click', blowAction));

async function startWishScene() {
  showScene('scene-wish');
  createStars();
  await delay(500);
  $('wish-card').classList.add('show');
  
  const text = "Hei, kamu. Ya, kamu yang lagi baca ini — hari ini hari kamu, dan aku nggak mau ngucapinnya dengan cara yang biasa.\n\nSemoga di umur sekarang, semuanya terasa lebih ringan dijalanin, hal kecil jadi lebih berarti, dan apa yang kamu impiin bisa mulai keliatan jalannya.\n\nKamu tuh udah jalan sejauh ini tanpa kamu sadar… semoga semua yang kamu lewatin sekarang pelan-pelan bikin kamu jadi lebih baik yaa, semangat terus!\n\nSelamat ulang tahun yaa 😄 semoga hari ini dan seterusnya berjalan baik terus buat kamu 🎂";
  
  typeWriter(text, "typewriter-text");
}

function typeWriter(text, elementId) {
  let i = 0;
  const speed = 50; 
  const container = $(elementId);
  
  function type() {
    if (i < text.length) {
      if (text.charAt(i) === "\n") {
        container.innerHTML += "<br>";
      } else {
        container.innerHTML += text.charAt(i);
      }
      i++;
      setTimeout(type, speed);
    } else {
        container.classList.remove('typing');
        $('btn-video').classList.add('show');
    }
  }
  type();
}

$('btn-video').addEventListener('click', () => {
  showScene('scene-video');
  $('bg-music').pause(); 
  const video = $('myVideo');
  video.play();
});

function createStars() {
  const sf = $('star-field');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `width:2px;height:2px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;`;
    sf.appendChild(s);
  }
}

function launchConfetti() {
  const canvas = $('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffd700'];
  const pieces = [];
  for (let i = 0; i < 100; i++) {
    pieces.push({ x: Math.random()*canvas.width, y: -20, color: colors[Math.floor(Math.random()*colors.length)], vy: 2+Math.random()*3 });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.y += p.vy;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 8, 8);
    });
    if(pieces[0].y < canvas.height) requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
